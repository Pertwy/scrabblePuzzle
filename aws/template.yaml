AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Scrabble Best Pick — puzzle storage API

Parameters:
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: '*'
    Description: >-
      Comma-separated CORS origins (Amplify URLs, http://localhost:3000).
      Use * to allow any origin (simplest for Amplify branch previews).
  EditApiKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: >-
      Optional secret required on PUT (X-Edit-Key header). Leave empty to
      allow saves without a key (same openness as a public /edit page).

Resources:
  PuzzlesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-puzzles'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: puzzleId
          AttributeType: S
      KeySchema:
        - AttributeName: puzzleId
          KeyType: HASH

  LeaderboardTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-leaderboard'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: puzzleId
          AttributeType: S
        - AttributeName: word
          AttributeType: S
        - AttributeName: score
          AttributeType: N
      KeySchema:
        - AttributeName: puzzleId
          KeyType: HASH
        - AttributeName: word
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ByScore
          KeySchema:
            - AttributeName: puzzleId
              KeyType: HASH
            - AttributeName: score
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  PuzzlesApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowMethods:
          - GET
          - PUT
          - POST
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-Edit-Key
        MaxAge: 600

  PuzzlesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Puzzles and leaderboard API
      CodeUri: lambda/puzzles/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref PuzzlesTable
          LEADERBOARD_TABLE_NAME: !Ref LeaderboardTable
          ALLOWED_ORIGINS: !Join
            - ','
            - !Ref AllowedOrigins
          EDIT_API_KEY: !Ref EditApiKey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PuzzlesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        ListPuzzles:
          Type: HttpApi
          Properties:
            ApiId: !Ref PuzzlesApi
            Path: /puzzles
            Method: GET
        CreateDraft:
          Type: HttpApi
          Properties:
            ApiId: !Ref PuzzlesApi
            Path: /puzzles
            Method: POST
        GetPuzzle:
          Type: HttpApi
          Properties:
            ApiId: !Ref PuzzlesApi
            Path: /puzzles/{puzzleId}
            Method: GET
        PutPuzzle:
          Type: HttpApi
          Properties:
            ApiId: !Ref PuzzlesApi
            Path: /puzzles/{puzzleId}
            Method: PUT
        DeletePuzzle:
          Type: HttpApi
          Properties:
            ApiId: !Ref PuzzlesApi
            Path: /puzzles/{puzzleId}
            Method: DELETE
        PublishPuzzle:
          Type: HttpApi
          Properties:
            ApiId: !Ref PuzzlesApi
            Path: /puzzles/{puzzleId}/publish
            Method: POST
        GetLeaderboardHigh:
          Type: HttpApi
          Properties:
            ApiId: !Ref PuzzlesApi
            Path: /puzzles/{puzzleId}/leaderboard/high
            Method: GET
        GetLeaderboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref PuzzlesApi
            Path: /puzzles/{puzzleId}/leaderboard
            Method: GET
        PostLeaderboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref PuzzlesApi
            Path: /puzzles/{puzzleId}/leaderboard
            Method: POST

Outputs:
  ApiEndpoint:
    Description: Base URL for REACT_APP_PUZZLES_API_URL (no trailing slash)
    Value: !Sub 'https://${PuzzlesApi}.execute-api.${AWS::Region}.amazonaws.com'
  PuzzlesTableName:
    Description: DynamoDB table name (for seed script)
    Value: !Ref PuzzlesTable
  LeaderboardTableName:
    Description: DynamoDB leaderboard table name
    Value: !Ref LeaderboardTable
